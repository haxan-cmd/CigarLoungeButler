name: Post Patch Notes to Discord

on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Post to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%s)
          SHORT_SHA=$(git log -1 --pretty=%h)
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")

          PAYLOAD=$(cat <<EOF
          {
            "content": "üìù **Cigar Lounge Butler ‚Äî Update**\n‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ\n‚Ä¢ ${COMMIT_MSG}\n\n\`${SHORT_SHA}\` by The Butler's Manager at ${TIMESTAMP}"
          }
          EOF
          )

          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
